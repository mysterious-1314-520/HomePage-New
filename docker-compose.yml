version: '3.8'

services:
  homepage:
    image: node:18-alpine
    container_name: homepage
    working_dir: /app
    volumes:
      - .:/app
      - homepage-data:/app/data
      - homepage-uploads:/app/static/uploads
    ports:
      - "4000:4000"
      - "4001:4001"
    environment:
      - PORT=4000
      - NODE_ENV=production
    command: >
      sh -c "cd server && npm install && cd .. &&
             cd admin && npm install && cd .. &&
             node server/index.js &
             node admin/server.js &
             wait"
    restart: unless-stopped

volumes:
  homepage-data:
  homepage-uploads:
