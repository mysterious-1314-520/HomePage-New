    window.cycleTheme = function() {
      var themes = ['default', 'dark', 'ocean', 'sunset', 'forest', 'ocean-dark'];
      var cur = document.documentElement.getAttribute('data-theme') || 'default';
      var idx = themes.indexOf(cur);
      var next = themes[(idx + 1) % themes.length];
      document.documentElement.setAttribute('data-theme', next);
      document.cookie = 'themeState=' + next + ';path=/;max-age=31536000';
    };
    })();

    <script>
    (function() {
        var API = '/api';

        // i18n Language Configuration
        var i18n = {
            zh: {
                skills: '技能',
                projects: '项目',
                music: '音乐',
                friends: '友情链接',
                latestVersion: '最新版本',
                videoTutorial: '视频教程',
                download: '下载',
                onlineDemo: '在线演示',
                github: 'GitHub',
                techStack: '技术栈',
                projectIntro: '项目介绍',
                screenshots: '项目截图',
                noData: '暂无数据',
                switchLang: '切换语言',
                switchTheme: '切换主题',
                notice: '公告'
            },
            en: {
                skills: 'Skills',
                projects: 'Projects',
                music: 'Music',
                friends: 'Friends',
                latestVersion: 'Latest Version',
                videoTutorial: 'Video Tutorial',
                download: 'Download',
                onlineDemo: 'Online Demo',
                github: 'GitHub',
                techStack: 'Tech Stack',
                projectIntro: 'Project Introduction',
                screenshots: 'Screenshots',
                noData: 'No data yet',
                switchLang: 'Switch Language',
                switchTheme: 'Switch Theme',
                notice: 'Notice'
            }
        };

        // Get current language from localStorage
        var currentLang = localStorage.getItem('lang') || 'zh';
        window.t = function(key) {
            return (i18n[currentLang] && i18n[currentLang][key]) || i18n.zh[key] || key;
        };

        // Language switch function
        window.switchLang = function() {
            var newLang = localStorage.getItem('lang') === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', newLang);
            location.reload();
        };

        // Track visit
        var vid = localStorage.getItem('_vid');
        var today = new Date().toISOString().slice(0, 10);
        var vidDate = localStorage.getItem('_vid_date');
        var headers = {};
        if (!vid || vidDate !== today) {
            vid = Math.random().toString(36).slice(2) + Date.now().toString(36);
            localStorage.setItem('_vid', vid);
            localStorage.setItem('_vid_date', today);
        } else {
            headers['X-Visit-Id'] = vid;
        }
        fetch(API + '/track-visit', { method: 'POST', headers: headers }).catch(function(){});

        fetch(API + '/homepage-data')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.code !== 200) return;
                var d = res.data;
                 var c = d.config || {};

                // Store project data for detail modal
                storeProjectData(d.projects);

                // Meta
                document.title = c.page_title || '你好，我是计堡';
                var metaDesc = document.getElementById('dyn-meta-desc');
                if (metaDesc) metaDesc.content = c.meta_description || '';
                var metaKw = document.getElementById('dyn-meta-kw');
                if (metaKw) metaKw.content = c.meta_keywords || '';

                // Logo
                var logo = document.getElementById('dyn-logo');
                if (logo && c.avatar_url) logo.style.backgroundImage = 'url(' + c.avatar_url + ')';

                // Location
                var loc = document.getElementById('dyn-location');
                if (loc) loc.textContent = c.location_label || 'Home';

                // Greeting
                var greet = document.getElementById('dyn-greeting');
                if (greet) {
                    var displayName = c.display_name || '计堡';
                    if ((c.greeting_mode || 'custom') === 'simple') {
                        greet.innerHTML = '你好，我是 <span class="gradientText">' + escHtml(displayName) + '</span>，很高兴认识你！';
                    } else {
                        var greetingHtml = c.greeting || '你好，我是 <span class="gradientText">计堡</span>';
                        greetingHtml = greetingHtml.replace(/<span class="gradientText">[^<]*<\/span>/g, '<span class="gradientText">' + escHtml(displayName) + '</span>');
                        greet.innerHTML = greetingHtml;
                    }
                }

                // Notices banner
                var nb = document.getElementById('dyn-notice-banner');
                if (nb && d.appNotices) {
                    var active = d.appNotices.filter(function(n) { return n.is_active; });
                    if (active.length > 0) {
                        var notice = active[0];
                        var html = '';
                        if (notice.image_url) {
                            html += '<img src="' + notice.image_url + '" alt="" class="notice-image">';
                        }
                        html += '<div class="notice-content">' + escHtml(notice.content) + '</div>';
                        if (notice.url && notice.url !== '1' && notice.url !== '#') {
                            html = '<a href="' + notice.url + '" target="_blank" class="notice-link">' + html + '</a>';
                        }
                        nb.innerHTML = html;
                        nb.style.display = 'flex';
                    }
                }

                // Tags
                var tagsEl = document.getElementById('dyn-tags');
                if (tagsEl && d.tags) {
                    tagsEl.innerHTML = d.tags.map(function(t) { return '<div class="left-tag-item">' + escHtml(t.tag) + '</div>'; }).join('');
                }

                // Theme: apply server default if no cookie override
                if (!document.cookie.match(/themeState=([^;]+)/) && c.theme) {
                    document.documentElement.setAttribute('data-theme', c.theme);
                }

                // Timeline
                var tlEl = document.getElementById('dyn-timeline');
                if (tlEl && d.timeline) {
                    tlEl.innerHTML = d.timeline.map(function(t) {
                        var focusClass = t.is_current ? ' focus current' : ' focus';
                        return '<li><div class="' + focusClass + '"></div><div>' + escHtml(t.date) + '</div><div>' + t.content + '</div></li>';
                    }).join('');
                }

                // Descriptions
                var descEl = document.getElementById('dyn-descriptions');
                if (descEl && c.descriptions) {
                    try {
                        var descs = JSON.parse(c.descriptions);
                        descEl.innerHTML = descs.map(function(d) {
                            var iconHtml = d.icon ? '<img src="' + d.icon + '" alt="" width="16" height="16"> ' : '';
                            return '<div class="description">' + iconHtml + (d.text || '') + '</div>';
                        }).join('');
                    } catch(e) {}
                }

                // Social links
                var slEl = document.getElementById('dyn-social-links');
                if (slEl && d.socialLinks) {
                    var linksHtml = '';
                    d.socialLinks.forEach(function(l) {
                        if (!l.is_active) return;
                        var tipHtml = l.tip_text ? '<div class="iconTip">' + escHtml(l.tip_text) + '</div>' : '';
                        var svg = getPlatformSvg(l.platform);
                        linksHtml += '<a class="' + l.display_style + '" target="_blank" href="' + l.url + '">' + svg + tipHtml + '</a>';
                    });
                    slEl.innerHTML = linksHtml;
                }

                // Utility buttons (theme + language)
                var utilContainer = document.getElementById('dyn-utility-buttons');
                if (utilContainer) {
                    var utilHtml = '';
                    // Theme cycle button
                    utilHtml += '<a class="iconItem switch" href="javascript:void(0)" onclick="cycleTheme()" title="' + t('switchTheme') + '">' +
                      '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' +
                      '</a>';
                    // Language switch button
                    utilHtml += '<a class="iconItem switch" href="javascript:void(0)" onclick="switchLang()" title="' + t('switchLang') + '">' +
                      '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 5h7M2 5c0 5.5 3.8 10 7 10M2 5l5 10M9 5h7M9 5c0 5.5 3.8 10 7 10M9 5l5 10M16 5h6"/><path d="M19 2v6M16 5h6"/></svg>' +
                      '</a>';
                    utilContainer.innerHTML = utilHtml;
                }

                // Skills
                var skEl = document.getElementById('dyn-skills');
                if (skEl && d.skills && d.skills.length) {
                    var skillsHtml = '<div class="section-title">' + t('skills') + '</div>';
                    d.skills.forEach(function(s) {
                        var pct = s.level || 80;
                        skillsHtml += '<div class="skill-item">' +
                            '<div class="skill-info"><span class="skill-name">' + escHtml(s.name) + '</span><span class="skill-pct">' + pct + '%</span></div>' +
                            '<div class="skill-bar"><div class="skill-fill" style="width:' + pct + '%;background:' + (s.color || '#6366f1') + '"></div></div>' +
                            '</div>';
                    });
                    skEl.innerHTML = skillsHtml;
                }

                // Projects
                var pc = document.getElementById('dyn-projects-container');
                if (pc && d.projects && d.projects.length) {
                    var projectsHtml = '';
                    d.projects.forEach(function(p) {
                        projectsHtml += '<div class="project-card-header">' + escHtml(p.title || '') + '</div>' +
                            '<div class="project-card" onclick="showProjectDetail(' + p.id + ')" style="cursor:pointer">' +
                            '<div class="project-card-icon"><img src="' + (p.app_icon || '') + '" alt=""></div>' +
                            '<div class="project-card-content">' +
                            '<div class="project-card-title">' + escHtml(p.app_name || '') + '</div>' +
                            '<div class="project-card-desc">' + escHtml(p.app_description || '') + '</div>';
                        // Latest version info
                        if (d.appVersions && d.appVersions.length) {
                            var lv = d.appVersions[0];
                            projectsHtml += '<div class="version-tag">' + t('latestVersion') + ' v' + escHtml(lv.version_code) + '</div>';
                        }
                        projectsHtml +=
                            (p.video_url ? '<a href="' + p.video_url + '" target="_blank" class="project-card-btn" style="background:transparent;color:#ff69b4;border:2px solid #ff69b4;margin-bottom:8px;"><svg viewBox="0 0 24 24" width="1.2em" height="1.2em"><path fill="currentColor" d="M18.223 3.086a1.25 1.25 0 0 1 0 1.768L17.08 5.996h1.17A3.75 3.75 0 0 1 22 9.746v7.5a3.75 3.75 0 0 1-3.75 3.75H5.75A3.75 3.75 0 0 1 2 17.246v-7.5a3.75 3.75 0 0 1 3.75-3.75h1.166L5.775 4.855a1.25 1.25 0 0 1 1.767-1.768l2.652 2.651c.079.08.145.166.198.258h3.213c.053-.092.12-.18.199-.259l2.651-2.651a1.25 1.25 0 0 1 1.768 0Zm.027 5.42H5.75a1.25 1.25 0 0 0-1.247 1.157l-.003.093v7.5c0 .66.51 1.2 1.157 1.247l.093.003h12.5a1.25 1.25 0 0 0 1.247-1.156l.003-.094v-7.5c0-.69-.56-1.25-1.25-1.25Zm-10 2.5c.69 0 1.25.56 1.25 1.25v1.25a1.25 1.25 0 0 1-2.5 0v-1.25c0-.69.56-1.25 1.25-1.25Zm7.5 0c.69 0 1.25.56 1.25 1.25v1.25a1.25 1.25 0 0 1-2.5 0v-1.25c0-.69.56-1.25 1.25-1.25Z"/></svg>' + t('videoTutorial') + '</a>' : '') +
                            '<a href="' + (p.download_url || '#') + '" target="_blank" class="project-card-btn">' + escHtml(p.download_text || t('download')) + '</a>' +
                            '</div></div>';
                    });
                    pc.innerHTML = projectsHtml;
                }

                // Music
                var mc = document.getElementById('dyn-music-container');
                if (mc && d.music && d.music.length) {
                    var first = d.music[0];
                    var st = document.getElementById('dyn-song-title');
                    if (st) st.textContent = first.song_title || '';
                    var ar = document.getElementById('dyn-artist');
                    if (ar) ar.textContent = first.artist || '';
                    var ly = document.getElementById('dyn-lyric');
                    if (ly) ly.textContent = first.lyric_snippet || '';
                    var mp = document.getElementById('musicPlayer');
                    if (mp && first.audio_file) mp.src = first.audio_file;

                    if (d.music.length > 1) {
                        var listHtml = '<div style="margin-top:12px;font-size:12px;color:var(--text-secondary);">更多歌曲：';
                        for (var i = 1; i < d.music.length; i++) {
                            listHtml += '<span style="margin:0 4px">' + escHtml(d.music[i].song_title) + ' - ' + escHtml(d.music[i].artist) + '</span>';
                            if (i < d.music.length - 1) listHtml += ' | ';
                        }
                        listHtml += '</div>';
                        mc.innerHTML += listHtml;
                    }
                }

                // Footer
                var footer = document.getElementById('dyn-footer');
                if (footer) {
                    footer.innerHTML = c.footer_copyright + ' &nbsp;&nbsp;|&nbsp;&nbsp;' + escHtml(c.footer_slogan || '') +
                        '<div><a href="' + (c.footer_icp_url || '#') + '" target="_blank">' + escHtml(c.footer_icp_number || '') + '</a> | ' +
                        '<a href="' + (c.footer_source_code_url || '#') + '" target="_blank" class="footer-links">' + escHtml(c.footer_source_code_label || 'SourceCode') + '</a></div>' +
                        ((d.friendLinks || []).length > 0 ? '<div style="margin-top:10px;font-size:12px">' +
                            d.friendLinks.map(function(l) { return '<a href="' + l.url + '" target="_blank" title="' + escHtml(l.description||'') + '">' + escHtml(l.name) + '</a>'; }).join(' &nbsp;|&nbsp; ') +
                        '</div>' : '');
                }
            })
            .catch(function(e) { console.error('Failed to load homepage data:', e); });

        function apiFetch(url, opts) {
            opts = opts || {};
            opts.headers = opts.headers || {};
            opts.headers['Content-Type'] = opts.headers['Content-Type'] || 'application/json';
            return fetch(url, opts);
        }

        // Project Detail Modal
        var _projectData = [];
        var _allProjects = [];

        // Store project data when loading
        window.storeProjectData = function(projects) {
            _allProjects = projects || [];
        };

        window.showProjectDetail = function(projectId) {
            var p = _allProjects.find(function(item) { return item.id === projectId; });
            if (!p) return;

            // Update modal labels with i18n
            var techLabel = document.getElementById('labelTechStack');
            if (techLabel) techLabel.textContent = t('techStack');
            var detailLabel = document.getElementById('labelProjectIntro');
            if (detailLabel) detailLabel.textContent = t('projectIntro');
            var screenshotsLabel = document.getElementById('labelScreenshots');
            if (screenshotsLabel) screenshotsLabel.textContent = t('screenshots');

            // Set icon and title
            var iconEl = document.getElementById('modalProjectIcon');
            if (iconEl) iconEl.src = p.app_icon || '';

            var titleEl = document.getElementById('modalProjectTitle');
            if (titleEl) titleEl.textContent = p.title || '';

            var nameEl = document.getElementById('modalProjectName');
            if (nameEl) nameEl.textContent = p.app_name || '';

            var descEl = document.getElementById('modalProjectDesc');
            if (descEl) descEl.textContent = p.app_description || '';

            // Tech stack
            var techContainer = document.getElementById('modalProjectTech');
            var techTags = document.getElementById('modalTechTags');
            if (techContainer && techTags) {
                if (p.tech_stack) {
                    techContainer.style.display = 'block';
                    var tags = p.tech_stack.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
                    techTags.innerHTML = tags.map(function(tag) { return '<span class="tech-tag">' + escHtml(tag) + '</span>'; }).join('');
                } else {
                    techContainer.style.display = 'none';
                }
            }

            // Detail description
            var detailContainer = document.getElementById('modalProjectDetail');
            var detailText = document.getElementById('modalDetailText');
            if (detailContainer && detailText) {
                if (p.detail_description) {
                    detailContainer.style.display = 'block';
                    detailText.textContent = p.detail_description;
                } else {
                    detailContainer.style.display = 'none';
                }
            }

            // Screenshots
            var screenshotsContainer = document.getElementById('modalScreenshots');
            var screenshotsGrid = document.getElementById('modalScreenshotsGrid');
            if (screenshotsContainer && screenshotsGrid) {
                if (p.screenshots) {
                    screenshotsContainer.style.display = 'block';
                    var imgs = p.screenshots.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
                    screenshotsGrid.innerHTML = imgs.map(function(url) {
                        return '<img class="screenshot-img" src="' + escHtml(url) + '" alt="' + t('screenshots') + '" onclick="window.open(this.src)">';
                    }).join('');
                } else {
                    screenshotsContainer.style.display = 'none';
                }
            }

            // Action buttons
            var actionsEl = document.getElementById('modalProjectActions');
            if (actionsEl) {
                var actionsHtml = '';
                if (p.github_url) {
                    actionsHtml += '<a href="' + p.github_url + '" target="_blank" class="project-modal-btn btn-github"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg> ' + t('github') + '</a>';
                }
                if (p.demo_url) {
                    actionsHtml += '<a href="' + p.demo_url + '" target="_blank" class="project-modal-btn btn-demo">' + t('onlineDemo') + '</a>';
                }
                if (p.video_url) {
                    actionsHtml += '<a href="' + p.video_url + '" target="_blank" class="project-modal-btn btn-video"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> ' + t('videoTutorial') + '</a>';
                }
                if (p.download_url) {
                    actionsHtml += '<a href="' + p.download_url + '" target="_blank" class="project-modal-btn btn-download">' + escHtml(p.download_text || t('download')) + '</a>';
                }
                actionsEl.innerHTML = actionsHtml;
            }

            // Show modal
            var modal = document.getElementById('projectDetailModal');
            if (modal) {
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        }

        window.closeProjectDetail = function() {
            var modal = document.getElementById('projectDetailModal');
            if (modal) {
                modal.style.display = 'none';
                document.body.style.overflow = '';
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeProjectDetail();
            }
        });
    })();
    </script>
