name: 问题咨询
description: 提出使用或配置相关问题
title: "[Question] "
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        提问前建议先查看 README 和 docs 目录。
  - type: textarea
    id: question
    attributes:
      label: 问题描述
      description: 请描述你遇到的问题或想确认的内容。
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 背景信息
      description: 请提供环境、配置、截图或日志片段。
    validations:
      required: false
