name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Run linter
        run: |
          npm install eslint --global
          npx eslint server/*.js server/routes/*.js

      - name: Verify startup
        run: |
          cd server
          timeout 10 node index.js || true
